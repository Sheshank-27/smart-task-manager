<!DOCTYPE html>
<html>

<head>
    <title>Edit Task</title>
</head>

<body>

<h2>Edit Task</h2>

<form method="POST">

    <input
        type="text"
        name="task"
        value="{{ task.name }}"
        required>

    <select name="priority">

        <option value="High">High</option>

        <option value="Medium">Medium</option>

        <option value="Low">Low</option>

    </select>

    <button type="submit">
        Update Task
    </button>

</form>

</body>

</html>
